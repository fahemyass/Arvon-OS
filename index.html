const INIT_POSTS=[
  {id:1,aid:'ALPHA',type:'BRIEFING',time:'2h ago',ts:Date.now()-7200000,read:false,saved:false,
    preview:'3 critical actions require your attention today. SC Gripe contract hold expires in 2 days — every day of delay costs you the April window.',
    full:`Good morning. Three things need your attention before anything else today.

SC Gripe: the provisional booking hold expires in 2 days. Edita Grubišić has not received a signed contract. This is the one action that keeps April available to you. Email her today — not tomorrow.

Le Méridien Lav: the group rate conversation is stalled. Without a confirmed accommodation number, the financial model stays soft and you cannot send a credible proposal to Kuwait. Call the MICE desk this morning.

Yassine permit: 160 days remaining. I want you to start the renewal file this week — not because it is urgent, but because 160 days becomes 90 days faster than founders expect when camps are running.

The business is in a buildable position. Nothing is broken. But the window for a May pilot camp is measured in weeks, not months. Move today.`},
  {id:2,aid:'GUARDIAN',type:'ALERT',time:'1h ago',ts:Date.now()-3600000,read:false,saved:false,
    preview:'CRITICAL: Business registration renewal due in 18 days. Company cannot sign contracts or invoice clients while this lapses.',
    full:`Business registration renewal is the most urgent item on my desk this morning.

18 days to the renewal deadline. In Croatian administrative practice, that means filing with HITRO.HR by end of this week. If this lapses, ARVON cannot sign contracts — any Gulf deal you close before renewal is legally unenforceable.

Kateryna: this is your action item. Contact the notary, confirm the exact renewal procedure, and verify with your accountant that all FINA filings are current.

ARVON risk rating this morning: Amber. Not red — no overdue critical items. But two deadlines landing within 25 days of each other with an unregistered VAT number and a soft accommodation contract makes me watchful.`},
  {id:3,aid:'NEXUS',type:'INTEL',time:'3 days ago',ts:Date.now()-259200000,read:false,saved:false,
    preview:'Weekly system analysis. HERMES email tone needs Qatari adjustment. One strategic move nobody has considered yet.',
    full:`The honest truth this week: ARVON is building infrastructure faster than pipeline.

The AgentOS architecture is solid. The destination intelligence is thorough. The financial model is conservative and credible. But there are zero confirmed leads with real decision-maker contact established. The system is ready to fire — there is no target yet.

HERMES ran against UAE and Kuwait leads. The email tone is calibrated for Dubai business culture — direct, efficient, peer-to-peer. That same tone in Qatari outreach reads as presumptuous. Qatar federation relationships are built through introduction, not cold approach. Adjust HERMES for warmer, more deferential openings with Qatari contacts.

The threat nobody is discussing: Yassine's operational availability in June. If the pilot camp runs May-June and the permit renewal is in active processing simultaneously, there is a scenario where administrative delays create a window of legal ambiguity. Kateryna must be operationally capable of running a camp without Yassine present.

The move nobody has thought of: contact the Croatian Football Federation (HNS). Not as a client — as a co-host partner. A Croatian national team training alongside a Gulf federation creates a bilateral sports diplomacy narrative that gets Gulf federation directors on the phone without a cold email.

NEXUS OUT.`},

    preview:'Generated outreach packages for UAE Football Federation and Kuwait Olympic Committee. Arabic + English versions ready to send.',
    full:`Two outreach packages generated and ready.

ENGLISH EMAIL ready: Peer-to-peer tone. Leads with SC Gripe EHF/FIBA certification — this matters to federation sport directors because it signals European competitive standard. Closes with specific May date window.

KHALID'S NOTE TO YASSINE: UAE Football Federation runs a €400K+ annual pre-season camp budget. The decision-maker is the Technical Director, not the General Secretary — confirm the name before sending. Send Tuesday morning UAE time (10:00 GST). Never follow up on a Friday.

Kuwait Olympic Committee: warmer approach. Kuwait's sports culture is more relationship-oriented than UAE. The email references the Jazeera Airways direct route to Tivat — this is a genuine differentiator that Kuwaiti federation directors do not know about yet.

Both emails in the output log. Review before sending.`},
  {id:5,aid:'ATLAS',type:'SUPPLIER',time:'5 days ago',ts:Date.now()-432000000,read:false,saved:false,
    preview:'Weekly scan complete. Found Hotel Park Split with confirmed halal catering capability — rare in the market. Plus 2 new coach operators.',
    full:`Weekly scan complete. Top findings this week.

HOTEL — Hotel Park Split ★★★★★ (Hatzeov perivoj 3): heated outdoor pool year-round at 27°C, congress facilities, 5km from SC Gripe. Group rate estimate €100-130/room shoulder season — at twin share that puts it at €50-65/player/night. More importantly: their F&B manager has a Bosnian Muslim background and has confirmed halal catering capability for groups in writing. This is rare in Split. Worth an immediate call.

MY RECOMMENDATION: Le Méridien Lav remains the flagship for Gulf client perception. But Hotel Park Split as a PROFESSIONAL tier alternative would give ARVON a €30-40/player/night cost advantage that meaningfully improves margin at the mid-tier.

    full:`Pilot camp financial model is viable — but not yet bankable.

The break-even math: 29 paying athletes covers €85,000. Every athlete above 29 generates ~€2,940 revenue against ~€1,400 marginal cost. At 35 athletes: €14,900. At 40 athletes: €29,700.

My recommendation this week: get a signed Letter of Intent from any Gulf federation for any date window. An LOI does not obligate them to much — but it obligates ARVON to start costing the actual camp, which will expose the 3-4 unresolved cost lines currently sitting as estimates.`},

    preview:'Strategic observation: the post-Ramadan window (April 6-20) is a better pilot camp timing than May. Gulf clubs need fitness rebuilding, not tactical prep.',
    full:`One thing I've been watching that is not on any task list.

The 2026 Gulf football pre-season is directly shaped by Ramadan, which ends March 30. That means Gulf clubs are looking for European camp windows in early April — not May, as ARVON currently targets for the pilot.

April in Split: 16-18°C, minimal rain, SC Gripe fully available, Le Méridien Lav pre-peak pricing. This is actually a better window for Gulf clients because they are coming out of Ramadan and need fitness rebuilding, not just tactical preparation. The camp has a different value proposition — and a more urgent one.

A 14-day camp starting April 6 (one week post-Eid) lands perfectly in the Gulf calendar. The problem: April 6 is 18 days from today. Not enough to confirm everything from scratch — but enough to have a preliminary conversation with a federation that has a pre-existing relationship.

My recommendation: identify one Gulf contact ARVON already has informal access to — not a cold lead, someone who knows the name. Ask one question: what does your April pre-season calendar look like? That conversation is the intelligence that makes everything else sharper.`},

No further action required today. Next escalation: 90 days.`},

function FeedPage({posts,setPosts,openChat}){
  const [filter,setFilter]=useState('All');
  const [expandedId,setExpandedId]=useState(null);
  const filters=['All','Briefing','Alert','Idea','Outreach','Supplier','Finance','Intel'];

  const shown=useMemo(()=>{
    if(filter==='All')return posts;
    return posts.filter(p=>p.type===filter.toUpperCase());
  },[posts,filter]);

  const toggle=(id)=>setPosts(ps=>ps.map(p=>p.id===id?{...p,read:true}:p));
  const save=(id)=>setPosts(ps=>ps.map(p=>p.id===id?{...p,saved:!p.saved}:p));

  return(
    <div className="page">
      <div className="topbar">
        <span className="logo">ARVON</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',animation:'pulseGlow 2s infinite'}}/>
          <span style={{fontSize:11,color:'var(--green)',fontWeight:600,letterSpacing:'.08em'}}>6 AGENTS LIVE</span>
        </div>
      </div>

      <StoryBar posts={posts} openChat={openChat}/>
      <div className="divider"/>

      <div className="pill-row" style={{paddingTop:12}}>
        {filters.map(f=>(
          <button key={f} className={`pill${filter===f?' on':''}`} onClick={()=>setFilter(f)}>{f}</button>
        ))}
      </div>

      <div style={{padding:'2px 12px 0',display:'flex',flexDirection:'column',gap:10}}>
        {shown.length===0&&(
          <div style={{textAlign:'center',padding:'48px 0',color:'var(--txt3)',fontSize:13}}>No posts in this category yet.</div>
        )}
        {shown.map((p,i)=>(
          <PostCard key={p.id} post={p} expanded={expandedId===p.id}
            onToggle={()=>{setExpandedId(expandedId===p.id?null:p.id);toggle(p.id);}}

function PostCard({post,expanded,onToggle,onSave,onChat,delay}){
  const a=agent(post.aid);
  const pt=PT[post.type]||PT.BRIEFING;
  const [copied,setCopied]=useState(false);
  const copy=()=>{
    navigator.clipboard?.writeText(post.full||post.preview).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1800);});
  };
  return(
    <div className="card" onClick={onToggle} style={{
      padding:'15px 15px 12px',cursor:'pointer',
      borderLeft:`3px solid ${a.color}30`,
      opacity:post.read?.9:1,
      animation:`fadeUp .3s ease ${delay*.06}s both`,
      transition:'border-color .2s, opacity .2s'}}>
      <div style={{display:'flex',gap:11,marginBottom:11}}>
        <Av id={post.aid} sz={40}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
            <span style={{fontSize:14,fontWeight:700}}>{post.aid}</span>
            <span style={{fontSize:12,color:a.color,fontWeight:500}}>· {a.persona}</span>
            {!post.read&&<div style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',flexShrink:0}}/>}
          </div>
          <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
            <span className={`badge ${pt.bc}`}>{pt.ic} {pt.label}</span>
            <span style={{fontSize:11,color:'var(--txt3)'}}>{post.time}</span>

        </div>
      </div>
      <div style={{fontSize:13.5,lineHeight:1.65,color:'var(--txt)',whiteSpace:'pre-line',wordBreak:'break-word'}}>
        {expanded?post.full:post.preview}
      </div>
      {post.full&&post.full!==post.preview&&(
        <div style={{marginTop:7,fontSize:12,color:'var(--gold)',fontWeight:500}}>{expanded?'Show less ↑':'Read more ↓'}</div>
      )}
      <div style={{display:'flex',gap:7,marginTop:13}} onClick={e=>e.stopPropagation()}>
        <button onClick={onSave} style={{
          padding:'6px 12px',borderRadius:10,border:`1px solid ${post.saved?`rgba(201,169,110,.4)`:'var(--b1)'}`,
          background:post.saved?'var(--gdim)':'var(--s2)',color:post.saved?'var(--gold)':'var(--txt3)',

          <svg width="12" height="12" viewBox="0 0 24 24" fill={post.saved?'currentColor':'none'} stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          {post.saved?'Saved':'Save'}
        </button>
        <button onClick={copy} style={{
          padding:'6px 12px',borderRadius:10,border:`1px solid ${copied?'rgba(76,175,125,.4)':'var(--b1)'}`,
          background:copied?'rgba(76,175,125,.1)':'var(--s2)',color:copied?'var(--green)':'var(--txt3)',
          cursor:'pointer',fontSize:11,fontFamily:'var(--sans)',fontWeight:600,display:'flex',gap:5,alignItems:'center'}}>
          {copied?'✓ Copied':'Copy'}
        </button>
        <button onClick={onChat} style={{
          marginLeft:'auto',padding:'6px 12px',borderRadius:10,border:'1px solid var(--b1)',
          background:'var(--s2)',color:'var(--txt2)',cursor:'pointer',fontSize:11,
          fontFamily:'var(--sans)',fontWeight:600,display:'flex',gap:5,alignItems:'center'}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

  );

   CHAT PAGE

function ChatPage({initAgent}){
  const [curAgent,setCurAgent]=useState(initAgent||'ALPHA');
  const [convos,setConvos]=useState({});
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const endRef=useRef(null);
  const taRef=useRef(null);

  useEffect(()=>{if(initAgent)setCurAgent(initAgent);},[initAgent]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[convos,typing,curAgent]);

  const a=agent(curAgent);
  const msgs=convos[curAgent]||[];

  const send=async()=>{
    const t=input.trim();if(!t)return;
    setInput('');
    if(taRef.current)taRef.current.style.height='auto';
    const um={id:Date.now(),role:'user',content:t};
    setConvos(p=>({...p,[curAgent]:[...(p[curAgent]||[]),um]}));
    setTyping(true);
    try{
      const hist=[...(convos[curAgent]||[]),um].map(m=>({role:m.role,content:m.content}));
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:a.sys,messages:hist})
      });
      const d=await res.json();
      const reply=d.content?.[0]?.text||'Unable to respond right now.';
      setConvos(p=>({...p,[curAgent]:[...(p[curAgent]||[]),{id:Date.now()+1,role:'assistant',content:reply}]}));
    }catch(e){
      setConvos(p=>({...p,[curAgent]:[...(p[curAgent]||[]),{id:Date.now()+1,role:'assistant',content:'Connection error. Check network and retry.'}]}));
    }finally{setTyping(false);}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'12px 16px 8px',borderBottom:'1px solid var(--b1)',
        background:'rgba(7,9,15,.96)',backdropFilter:'blur(20px)',position:'sticky',top:0,zIndex:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Av id={curAgent} sz={34} ring/>
            <div>
              <span style={{fontSize:15,fontWeight:700}}>{a.id}</span>
              <span style={{fontSize:12,color:a.color,marginLeft:6}}>· {a.persona}</span>
            </div>
          </div>
          <span style={{fontSize:10,background:'var(--s2)',border:'1px solid var(--b1)',padding:'3px 9px',borderRadius:8,color:'var(--txt3)',letterSpacing:'.04em'}}>AI POWERED</span>
        </div>
        <div className="pill-row" style={{padding:0,gap:5}}>
          {AGENTS.map(ag=>(
            <button key={ag.id} className={`pill${curAgent===ag.id?' on':''}`}
              onClick={()=>{setCurAgent(ag.id);setInput('');setTyping(false);}}
              style={{borderColor:curAgent===ag.id?`${ag.color}50`:'var(--b1)',
                color:curAgent===ag.id?ag.color:'var(--txt2)',fontSize:12,padding:'5px 11px'}}>
              {ag.id}
            </button>
          ))}
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:4,scrollbarWidth:'none'}}>
        {msgs.length===0&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'55%',gap:14,opacity:.6}}>
            <Av id={curAgent} sz={60} ring/>
            <div style={{textAlign:'center',maxWidth:220}}>
              <div style={{fontFamily:'var(--serif)',fontStyle:'italic',fontSize:18,marginBottom:5}}>{a.persona}</div>
              <div style={{fontSize:12.5,color:'var(--txt2)',lineHeight:1.6}}>{a.role}</div>
              <div style={{fontSize:11,color:'var(--txt3)',marginTop:8}}>Ask me anything about ARVON</div>
            </div>
          </div>
        )}
        {msgs.map((m,i)=>{
          const isU=m.role==='user';
          const showAv=!isU&&(!msgs[i-1]||msgs[i-1].role==='user');
          return(
            <div key={m.id||i} style={{display:'flex',flexDirection:isU?'row-reverse':'row',
              alignItems:'flex-end',gap:8,marginBottom:3,animation:'fadeUp .2s ease both'}}>
              {!isU&&<div style={{width:28,flexShrink:0}}>{showAv&&<Av id={curAgent} sz={28} ring={false}/>}</div>}
              <div style={{maxWidth:'80%',
                background:isU?`linear-gradient(135deg,${a.color}CC,${a.color}88)`:'var(--s2)',
                color:isU?'#060a10':'var(--txt)',
                borderRadius:isU?'18px 18px 4px 18px':'18px 18px 18px 4px',
                padding:'11px 14px',fontSize:13.5,lineHeight:1.62,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                {m.content}
              </div>
            </div>
          );
        })}
        {typing&&(
          <div style={{display:'flex',alignItems:'flex-end',gap:8,marginBottom:3}}>
            <Av id={curAgent} sz={28} ring={false}/>
            <div style={{background:'var(--s2)',borderRadius:'18px 18px 18px 4px',padding:'12px 15px',display:'flex',gap:4,alignItems:'center'}}>
              {[0,1,2].map(i=>(<div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--txt3)',animation:`typingDot 1.2s ease infinite`,animationDelay:`${i*.2}s`}}/>))}
            </div>
          </div>
        )}
        <div ref={endRef} style={{height:1}}/>
      </div>

      {/* Input */}
      <div style={{padding:'10px 14px 12px',borderTop:'1px solid var(--b1)',background:'var(--bg)',
        marginBottom:`calc(var(--nav) + var(--safe))`,display:'flex',gap:9,alignItems:'flex-end'}}>
        <textarea ref={taRef} value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder={`Message ${a.persona}...`} rows={1}
          style={{flex:1,background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:22,
            color:'var(--txt)',fontSize:14,padding:'11px 15px',fontFamily:'var(--sans)',
            resize:'none',outline:'none',lineHeight:1.5,maxHeight:110,overflowY:'auto',transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor=a.color}
          onBlur={e=>e.target.style.borderColor='var(--b2)'}
          onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,110)+'px';}}
        />
        <button onClick={send} disabled={!input.trim()} style={{
          width:44,height:44,borderRadius:'50%',border:'none',flexShrink:0,cursor:input.trim()?'pointer':'default',
          background:input.trim()?`linear-gradient(135deg,${a.color},${a.color}99)`:'var(--s3)',
          display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',
          transform:input.trim()?'scale(1)':'scale(.93)'}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke={input.trim()?'#060a10':'var(--txt3)'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

              <div style={{display:'flex',gap:9,alignItems:'center'}}>

                <span style={{fontSize:12,color:'var(--txt3)'}}>Due {t.due}</span>

          const dc=c.days<14?'br':c.days<30?'bo':c.days<90?'bg':'bgr';

              <div style={{fontSize:12,color:'var(--txt3)',fontStyle:'italic'}}>{c.action}</div>

        {tab==='Pipeline'&&<>
          <div className="card" style={{padding:'18px'}}>
            <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',marginBottom:5}}>PILOT CAMP PROJECTION</div>
            <div style={{fontFamily:'var(--serif)',fontSize:36,color:'var(--gold)',fontWeight:400,marginBottom:4}}>€102,900</div>
            <div style={{fontSize:12,color:'var(--txt3)',marginBottom:14}}>35 athletes × €210/day × 14 days</div>
            <div className="track" style={{marginBottom:7}}>
              <div className="bar bar-gold" style={{width:'0%'}}/>
            </div>
            <div style={{fontSize:11,color:'var(--txt3)'}}>€0 of €51,450 deposit received — awaiting LOI</div>
          </div>
          <div className="card" style={{padding:'16px'}}>
            <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',marginBottom:12}}>YEAR 1 TARGETS</div>
            {[['Revenue target','€180,000','var(--gold)'],['Gross margin','≥ 20%','var(--green)'],['Camps','2 delivered','var(--txt)'],['Break-even','29 athletes','var(--orange)']].map(([l,v,c])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--b1)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{l}</span>
                <span style={{fontSize:13,fontWeight:600,color:c}}>{v}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:'16px'}}>
            <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',marginBottom:12}}>ACTIVE LEADS</div>
            {[{f:'🇰🇼',n:'Kuwait Handball Federation',s:'Negotiation',v:'€102,900',c:'bo'},
              {f:'🇦🇪',n:'UAE Basketball Academy',s:'Proposal Sent',v:'€88,200',c:'bg'},
              {f:'🇶🇦',n:'Qatar Volleyball Club',s:'Inquiry',v:'€73,500',c:'bm'}].map(l=>(
              <div key={l.n} style={{display:'flex',gap:12,alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--b1)'}}>
                <span style={{fontSize:22}}>{l.f}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{l.n}</div>
                  <span className={`badge ${l.c}`} style={{marginTop:3,fontSize:9}}>{l.s}</span>
                </div>
                <span style={{fontFamily:'var(--serif)',fontSize:15,color:'var(--gold)'}}>{l.v}</span>

        </>}

  );
}

/* ══════════════════════════════════════
   COMMAND PAGE
══════════════════════════════════════ */
function CommandPage({openChat}){
  const [sts,setSts]=useState({});
  const [log,setLog]=useState([
    {id:1,aid:'ALPHA',time:'Today 07:00',msg:'Morning briefing delivered to Telegram'},
    {id:2,aid:'GUARDIAN',time:'Today 08:00',msg:'Compliance scan — 2 items flagged'},
    {id:3,aid:'ATLAS',time:'Sun 07:30',msg:'Supplier scan — 5 new prospects found'},
    {id:4,aid:'NEXUS',time:'Last Sunday',msg:'Weekly system analysis complete'},
  ]);

  const run=async(id)=>{
    if(sts[id]==='running')return;
    setSts(p=>({...p,[id]:'running'}));
    try{await fetch(`https://arvon.app.n8n.cloud/webhook/run-${id.toLowerCase()}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent:id})});}catch{}
    setSts(p=>({...p,[id]:'success'}));
    setLog(p=>[{id:Date.now(),aid:id,time:'Just now',msg:`${id} triggered manually`},...p.slice(0,9)]);
    setTimeout(()=>setSts(p=>({...p,[id]:'idle'})),3000);
  };

  const manual=AGENTS.filter(a=>a.trigger==='manual');
  const auto=AGENTS.filter(a=>a.trigger==='auto');

  return(
    <div className="page">
      <div className="topbar">
        <span className="logo">Command</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',animation:'pulseGlow 2s infinite'}}/>
          <span style={{fontSize:11,color:'var(--green)',letterSpacing:'.06em',fontWeight:600}}>n8n LIVE</span>
        </div>
      </div>
      <div style={{padding:'12px 12px 0',display:'flex',flexDirection:'column',gap:8}}>
        <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',padding:'2px 4px'}}>MANUAL TRIGGER AGENTS</div>
        {manual.map((a,i)=>{
          const st=sts[a.id]||'idle';
          const btnStyle={
            idle:{bg:`linear-gradient(135deg,${a.color},${a.color}99)`,c:'#060a10',l:`▶  Run ${a.id}`},
            running:{bg:'var(--s3)',c:'var(--txt2)',l:'Running...'},
            success:{bg:'rgba(76,175,125,.12)',c:'var(--green)',l:'✓ Triggered'},
          }[st];
          return(
            <div key={a.id} className="card" style={{padding:'14px 16px',borderLeft:`3px solid ${a.color}40`,animation:`fadeUp .3s ease ${i*.08}s both`}}>
              <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
                <Av id={a.id} sz={42} ring/>
                <div>
                  <span style={{fontSize:15,fontWeight:700}}>{a.id}</span>
                  <span style={{fontSize:12,color:a.color,marginLeft:6}}>· {a.persona}</span>
                  <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>{a.role}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>run(a.id)} style={{flex:2,height:42,borderRadius:11,border:'none',cursor:'pointer',
                  background:btnStyle.bg,color:btnStyle.c,fontFamily:'var(--sans)',fontSize:13,fontWeight:600,transition:'all .2s'}}>
                  {btnStyle.l}
                </button>
                <button onClick={()=>openChat(a.id)} style={{flex:1,height:42,borderRadius:11,
                  border:'1px solid var(--b2)',background:'transparent',color:'var(--txt2)',cursor:'pointer',
                  fontFamily:'var(--sans)',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  Chat
                </button>
              </div>
            </div>
          );
        })}
        <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',padding:'8px 4px 2px'}}>SCHEDULED AGENTS</div>
        {auto.map((a,i)=>(
          <div key={a.id} className="card" style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:12,animation:`fadeUp .3s ease ${(i+2)*.08}s both`}}>
            <Av id={a.id} sz={40} ring/>
            <div style={{flex:1}}>
              <span style={{fontSize:14,fontWeight:700}}>{a.id}</span>
              <span style={{fontSize:12,color:a.color,marginLeft:6}}>· {a.persona}</span>
              <div style={{fontSize:11,color:'var(--txt3)',marginTop:2}}>{a.schedule}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <ASBadge status={a.status}/>
              <div style={{fontSize:10,color:'var(--txt3)',marginTop:4}}>{a.next}</div>
            </div>
          </div>
        ))}
        <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'.08em',padding:'8px 4px 2px'}}>ACTIVITY LOG</div>
        <div className="card" style={{overflow:'hidden'}}>
          {log.map((entry,i)=>{
            const a=agent(entry.aid);
            return(
              <div key={entry.id} style={{padding:'11px 14px',borderBottom:i<log.length-1?'1px solid var(--b1)':'none',display:'flex',gap:11,alignItems:'center'}}>
                <Av id={entry.aid} sz={28} ring={false}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12.5,fontWeight:600}}>{entry.aid}</div>
                  <div style={{fontSize:11,color:'var(--txt3)'}}>{entry.msg}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--txt3)'}}>{entry.time}</div>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',marginLeft:'auto',marginTop:4}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════ */
function Nav({tab,go,unread}){
  const items=[
    {id:'feed',l:'Feed',ic:(on)=><svg width="21" height="21" viewBox="0 0 24 24" fill={on?'currentColor':'none'} stroke="currentColor" strokeWidth="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,dot:unread>0?unread:null},
    {id:'agents',l:'Agents',ic:(on)=><svg width="21" height="21" viewBox="0 0 24 24" fill={on?'currentColor':'none'} stroke="currentColor" strokeWidth="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
    {id:'data',l:'Data',ic:(on)=><svg width="21" height="21" viewBox="0 0 24 24" fill={on?'currentColor':'none'} stroke="currentColor" strokeWidth="1.9"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
    {id:'command',l:'Run',ic:(on)=><svg width="21" height="21" viewBox="0 0 24 24" fill={on?'currentColor':'none'} stroke="currentColor" strokeWidth="1.9"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>},
  ];
  return(
    <nav className="nav-bar">
      {items.slice(0,2).map(item=>{
        const on=tab===item.id;
        return(
          <button key={item.id} className={`ni${on?' on':''}`} onClick={()=>go(item.id)}>
            {item.ic(on)}
            <span>{item.l}</span>
            {item.dot&&<span className="ndot">{item.dot}</span>}
          </button>
        );
      })}
      {/* Center chat button */}
      <button className={`ni-center${tab==='chat'?' on':''}`} onClick={()=>go('chat')}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill={tab==='chat'?'#060a10':'#060a10'} stroke="#060a10" strokeWidth="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      {items.slice(2).map(item=>{
        const on=tab===item.id;
        return(
          <button key={item.id} className={`ni${on?' on':''}`} onClick={()=>go(item.id)}>
            {item.ic(on)}
            <span>{item.l}</span>
          </button>
        );
      })}
    </nav>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('feed');
  const [chatAgent,setChatAgent]=useState('ALPHA');
  const [posts,setPosts]=useState(INIT_POSTS);
  const unread=posts.filter(p=>!p.read).length;

  const go=(t,ctx)=>{setTab(t);if(t==='chat'&&ctx)setChatAgent(ctx);};
  const openChat=(id)=>go('chat',id);

  return(
    <>
      {tab==='feed'&&<FeedPage posts={posts} setPosts={setPosts} openChat={openChat}/>}
      {tab==='agents'&&<AgentsPage openChat={openChat}/>}
      {tab==='chat'&&<ChatPage initAgent={chatAgent}/>}
      {tab==='data'&&<DataPage/>}
      {tab==='command'&&<CommandPage openChat={openChat}/>}
      <Nav tab={tab} go={go} unread={unread}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
